name: snippetsearch

services:
  db:
    image: postgres:17
    container_name: snippetsearch-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snippet_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snippet_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    image: snippetsearch-api
    container_name: snippetsearch-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/snippet_search
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: snippetsearch_postgres_data
