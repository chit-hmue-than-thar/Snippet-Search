# Optional Render Blueprint — deploy backend + PostgreSQL from the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: snippetsearch-db
    databaseName: snippet_search
    user: snippetsearch
    plan: free

services:
  - type: web
    name: snippetsearch-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snippetsearch-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
